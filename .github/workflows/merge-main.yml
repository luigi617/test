name: Merge main
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge main
        uses: ./.github/actions/merge-main
        with:
          ci-user-pat: ${{ secrets.CI_USER_PAT }}
          exempt-branches: ""
